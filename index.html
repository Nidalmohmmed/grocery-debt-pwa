<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>دفتر ديون البقالة</title>
   
    <!-- Bootstrap + Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/icons/icon-512x512.png">
   
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="authContainer" class="auth-card">
    <div class="header-gradient">
        <h2><i class="fas fa-store"></i> دفتر الديون </h2>
        <p>نظام إدارة الديون   </p>
    </div>
    <div class="p-4 bg-white">
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">تسجيل دخول</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">حساب جديد</button>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="login">
                <form id="loginForm">
                    <div class="mb-3">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <input type="email" id="loginEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label><i class="fas fa-lock"></i> كلمة المرور</label>
                        <input type="password" id="loginPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">دخول</button>
                </form>
                <div id="loginError" class="text-danger mt-2 small"></div>
            </div>
            <div class="tab-pane fade" id="register">
                <form id="registerForm">
                    <div class="mb-3">
                        <label><i class="fas fa-user"></i> اسم البقال</label>
                        <input type="text" id="registerName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <input type="email" id="registerEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label><i class="fas fa-lock"></i> كلمة المرور (6 أحرف)</label>
                        <input type="password" id="registerPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">إنشاء حساب</button>
                </form>
                <div id="registerError" class="text-danger mt-2 small"></div>
            </div>
        </div>
    </div>
</div>

<div id="appContainer" class="app-card" style="display: none;">
    <div class="header-gradient">
        <div class="d-flex justify-content-between align-items-center">
            <h3><i class="fas fa-notebook"></i> دفتر الديون</h3>
            <button id="logoutBtn" class="btn btn-sm btn-outline-light"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
        <div class="mt-2">
            <span class="total-debt-number" id="totalDebt">0</span>
            <small> إجمالي الديون</small>
        </div>
    </div>
    <div class="p-3 bg-white">
        <div class="row mb-3 no-print">
            <div class="col-4">
                <button id="showStatsBtn" class="btn btn-outline-primary w-100"><i class="fas fa-chart-line"></i> إحصائيات</button>
            </div>
            <div class="col-4">
                <button id="printReportBtn" class="btn btn-outline-success w-100"><i class="fas fa-print"></i> طباعة</button>
            </div>
            <div class="col-4">
                <button id="addCustomerBtn" class="btn btn-custom-primary w-100"><i class="fas fa-user-plus"></i> عميل</button>
            </div>
        </div>
       
        <div class="row mb-3" id="statsRow">
            <div class="col-4">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-value" id="statCustomers">0</div>
                    <small>إجمالي العملاء</small>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-card">
                    <i class="fas fa-dollar-sign"></i>
                    <div class="stat-value" id="statDebtors">0</div>
                    <small>عملاء مدينون</small>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div class="stat-value" id="statZero">0</div>
                    <small>رصيد صفر</small>
                </div>
            </div>
        </div>
       
        <div class="row mb-3 no-print">
            <div class="col-12">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 بحث باسم العميل أو رقم الهاتف...">
            </div>
        </div>
       
        <div id="customersList">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
        </div>
       
        <div id="printArea" class="print-only">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2>دفتر ديون البقالة</h2>
                <p>تاريخ التقرير: <span id="printDate"></span></p>
            </div>
            <div id="printCustomersList"></div>
            <div id="printSummary"></div>
        </div>
    </div>
</div>

<!-- النوافذ المنبثقة -->
<div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-user-plus"></i> إضافة عميل</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="customerId">
                <div class="mb-3"><input type="text" id="customerName" class="form-control" placeholder="اسم العميل *"></div>
                <div class="mb-3"><input type="tel" id="customerPhone" class="form-control" placeholder="رقم الهاتف"></div>
                <div class="mb-3"><textarea id="customerNotes" class="form-control" rows="2" placeholder="ملاحظات"></textarea></div>
                <button id="saveCustomerBtn" class="btn btn-primary w-100">حفظ</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="transactionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="transactionModalTitle">إضافة معاملة</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="transactionCustomerId">
                <div class="mb-3">
                    <select id="transactionType" class="form-select">
                        <option value="debt">💰 دين جديد</option>
                        <option value="payment">✅ سداد</option>
                    </select>
                </div>
                <div class="mb-3"><input type="number" id="transactionAmount" step="0.01" class="form-control" placeholder="المبلغ"></div>
                <div class="mb-3"><input type="text" id="transactionNote" class="form-control" placeholder="ملاحظة"></div>
                <button id="saveTransactionBtn" class="btn btn-success w-100">تأكيد</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                <h5 class="modal-title" id="detailsCustomerName"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3"><strong>الرصيد الحالي:</strong><div id="detailsBalance" class="fs-2 fw-bold"></div></div>
                <hr><h6><i class="fas fa-history"></i> سجل المعاملات</h6>
                <div id="transactionsList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
            <div class="modal-footer">
                <button id="addDebtBtn" class="btn btn-danger"><i class="fas fa-arrow-down"></i> إضافة دين</button>
                <button id="addPaymentBtn" class="btn btn-success"><i class="fas fa-arrow-up"></i> إضافة سداد</button>
                <button id="deleteCustomerBtn" class="btn btn-secondary"><i class="fas fa-trash"></i> حذف العميل</button>
                <button id="printCustomerStatementBtn" class="btn btn-info"><i class="fas fa-print"></i> طباعة كشف الحساب</button>
                <button id="saveCustomerStatementBtn" class="btn btn-primary"><i class="fas fa-camera"></i> حفظ الكشف كملف نصي</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
            </div>
        </div>
    </div>
</div>
<!-- رسالة التحديث -->
<div id="updateToast" class="update-toast">
    <i class="fas fa-download"></i>
    <span>📱 يتوفر تحديث جديد للتطبيق!</span>
    <button id="updateBtn">تحديث الآن</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js" type="module"></script>
</body>
</html>
