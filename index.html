<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>دفتر ديون البقالة</title>
   
    <!-- Bootstrap + Font Awesome (استخدم روابط بديلة) -->
    <link rel="maninfest" href="/mainfest.json">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
   
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card, .app-card {
            max-width: 800px;
            margin: 0 auto;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .header-gradient {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .total-debt-number {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd93d;
        }
        .customer-card {
            cursor: pointer;
            margin-bottom: 12px;
            border-radius: 15px;
            transition: all 0.3s;
            background: white;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .customer-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .balance-positive { color: #e74c3c; font-weight: bold; font-size: 1.1rem; }
        .balance-zero { color: #27ae60; font-weight: bold; }
        .btn-custom-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
        }
        .btn-custom-primary:hover { color: white; transform: scale(1.02); }
        .loading { text-align: center; padding: 40px; color: #95a5a6; }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="authContainer" class="auth-card">
    <div class="header-gradient">
        <h2><i class="fas fa-store"></i> دفتر ديون البقالة</h2>
        <p>نظام إدارة الديون - يعمل بدون إنترنت</p>
    </div>
    <div class="p-4 bg-white">
        <ul class="nav nav-tabs mb-3" id="authTab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">تسجيل دخول</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">حساب جديد</button>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="login">
                <form id="loginForm">
                    <div class="mb-3">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <input type="email" id="loginEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label><i class="fas fa-lock"></i> كلمة المرور</label>
                        <input type="password" id="loginPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">دخول</button>
                </form>
                <div id="loginError" class="text-danger mt-2 small"></div>
            </div>
            <div class="tab-pane fade" id="register">
                <form id="registerForm">
                    <div class="mb-3">
                        <label><i class="fas fa-user"></i> اسم البقال</label>
                        <input type="text" id="registerName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <input type="email" id="registerEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label><i class="fas fa-lock"></i> كلمة المرور (6 أحرف)</label>
                        <input type="password" id="registerPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">إنشاء حساب</button>
                </form>
                <div id="registerError" class="text-danger mt-2 small"></div>
                <div id="registerSuccess" class="text-success mt-2 small"></div>
            </div>
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="appContainer" class="app-card" style="display: none;">
    <div class="header-gradient">
        <div class="d-flex justify-content-between align-items-center">
            <h3><i class="fas fa-notebook"></i> دفتر ديون</h3>
            <button id="logoutBtn" class="btn btn-sm btn-outline-light"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
        <div class="mt-2">
            <span class="total-debt-number" id="totalDebt">0</span> <small>ر.ي إجمالي الديون</small>
        </div>
    </div>
    <div class="p-3 bg-white">
        <div class="row mb-3">
            <div class="col-md-8 mb-2">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 بحث...">
            </div>
            <div class="col-md-4">
                <button id="addCustomerBtn" class="btn btn-custom-primary w-100"><i class="fas fa-user-plus"></i> عميل جديد</button>
            </div>
        </div>
        <div id="customersList" style="max-height: 500px; overflow-y: auto;">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
        </div>
    </div>
</div>

<!-- باقي النوافذ المنبثقة (بنفس الكود السابق) -->
<div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">إضافة عميل</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="customerName" class="form-control mb-2" placeholder="اسم العميل *">
                <input type="tel" id="customerPhone" class="form-control mb-2" placeholder="رقم الهاتف">
                <textarea id="customerNotes" class="form-control mb-2" rows="2" placeholder="ملاحظات"></textarea>
                <button id="saveCustomerBtn" class="btn btn-primary w-100">حفظ</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="transactionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="transactionModalTitle">إضافة معاملة</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="transactionCustomerId">
                <select id="transactionType" class="form-select mb-2">
                    <option value="debt">💰 دين جديد</option>
                    <option value="payment">✅ سداد</option>
                </select>
                <input type="number" id="transactionAmount" step="0.01" class="form-control mb-2" placeholder="المبلغ">
                <input type="text" id="transactionNote" class="form-control mb-2" placeholder="ملاحظة">
                <button id="saveTransactionBtn" class="btn btn-success w-100">تأكيد</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                <h5 class="modal-title" id="detailsCustomerName"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3"><strong>الرصيد:</strong> <span id="detailsBalance" class="fs-2 fw-bold"></span></div>
                <hr><h6>سجل المعاملات</h6>
                <div id="transactionsList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
            <div class="modal-footer">
                <button id="addDebtBtn" class="btn btn-danger">إضافة دين</button>
                <button id="addPaymentBtn" class="btn btn-success">إضافة سداد</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    // ========================================
    // 🔑 ضع بيانات Firebase الحقيقية هنا
    // ========================================
    const firebaseConfig = {
        apiKey: "AIzaSyByNwAryNIlD3R5c_5YbSCt8lP3jZ0hE_0",          // ← استبدل
        authDomain: "grocerydebrbook.firebaseapp.com",  // ← استبدل
        projectId: "grocerydebrbook",    // ← استبدل
        storageBucket: "grocerydebrbook.firebasestorage.app",
        messagingSenderId: "877346824604",
        appId: "1:877346824604:web:7d1059a2ee63157da9a859"
    };
   
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
   
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
   
    let currentUser = null;
    let currentCustomers = [];
   
    // مراقبة حالة تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        console.log("حالة المستخدم:", user ? user.email : "لا يوجد");
        if (user) {
            currentUser = user;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            loadCustomers();
        } else {
            currentUser = null;
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('appContainer').style.display = 'none';
        }
    });
   
    // تسجيل الدخول
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            console.log("✅ تم تسجيل الدخول");
        } catch (error) {
            document.getElementById('loginError').innerText = error.message;
        }
    });
   
    // إنشاء حساب
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('registerName').value;
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCredential.user, { displayName: name });
            document.getElementById('registerSuccess').innerText = '✅ تم إنشاء الحساب بنجاح!';
            setTimeout(() => location.reload(), 1500);
        } catch (error) {
            document.getElementById('registerError').innerText = error.message;
        }
    });
   
    // تسجيل خروج
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
   
    // تحميل العملاء
    async function loadCustomers() {
        if (!currentUser) return;
        try {
            const q = query(collection(db, 'customers'), where('userId', '==', currentUser.uid));
            const snapshot = await getDocs(q);
            currentCustomers = [];
            snapshot.forEach(doc => currentCustomers.push({ id: doc.id, ...doc.data() }));
            displayCustomers(currentCustomers);
        } catch (err) {
            console.error(err);
        }
    }
   
    async function displayCustomers(customers) {
        const container = document.getElementById('customersList');
        if (customers.length === 0) {
            container.innerHTML = '<div class="text-center p-5 text-muted">لا يوجد عملاء</div>';
            return;
        }
        container.innerHTML = '';
        let totalDebt = 0;
        for (const c of customers) {
            const balance = await getCustomerBalance(c.id);
            if (balance > 0) totalDebt += balance;
            const card = document.createElement('div');
            card.className = 'customer-card card';
            card.onclick = () => showCustomerDetails(c);
            card.innerHTML = `<div class="card-body d-flex justify-content-between"><div><strong>${c.name}</strong><br><small>${c.phone || ''}</small></div><div class="${balance > 0 ? 'balance-positive' : 'balance-zero'}">${balance.toFixed(2)} ج.م</div></div>`;
            container.appendChild(card);
        }
        document.getElementById('totalDebt').innerHTML = `${totalDebt.toFixed(2)} <small>ج.م</small>`;
    }
   
    async function getCustomerBalance(customerId) {
        if (!currentUser) return 0;
        const q = query(collection(db, 'transactions'), where('customerId', '==', customerId), where('userId', '==', currentUser.uid));
        const snapshot = await getDocs(q);
        let balance = 0;
        snapshot.forEach(doc => {
            const t = doc.data();
            if (t.type === 'debt') balance += t.amount;
            else balance -= t.amount;
        });
        return balance;
    }
   
    document.getElementById('saveCustomerBtn').onclick = async () => {
        const name = document.getElementById('customerName').value.trim();
        if (!name) return alert('الاسم مطلوب');
        await addDoc(collection(db, 'customers'), {
            userId: currentUser.uid,
            name, phone: document.getElementById('customerPhone').value,
            notes: document.getElementById('customerNotes').value,
            createdAt: new Date().toISOString()
        });
        bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
        loadCustomers();
    };
   
    document.getElementById('addCustomerBtn').onclick = () => {
        document.getElementById('customerName').value = '';
        document.getElementById('customerPhone').value = '';
        document.getElementById('customerNotes').value = '';
        new bootstrap.Modal(document.getElementById('customerModal')).show();
    };
   
    document.getElementById('saveTransactionBtn').onclick = async () => {
        const customerId = document.getElementById('transactionCustomerId').value;
        const amount = parseFloat(document.getElementById('transactionAmount').value);
        if (!amount || amount <= 0) return alert('المبلغ مطلوب');
        await addDoc(collection(db, 'transactions'), {
            userId: currentUser.uid, customerId,
            type: document.getElementById('transactionType').value,
            amount, note: document.getElementById('transactionNote').value,
            date: new Date().toISOString().split('T')[0]
        });
        bootstrap.Modal.getInstance(document.getElementById('transactionModal')).hide();
        loadCustomers();
    };
   
    async function showCustomerDetails(customer) {
        const balance = await getCustomerBalance(customer.id);
        document.getElementById('detailsCustomerName').innerHTML = `<i class="fas fa-user-circle"></i> ${customer.name}`;
        document.getElementById('detailsBalance').innerHTML = `${balance.toFixed(2)} ج.م`;
        const transactionsDiv = document.getElementById('transactionsList');
        const q = query(collection(db, 'transactions'), where('customerId', '==', customer.id), where('userId', '==', currentUser.uid));
        const snapshot = await getDocs(q);
        const transactions = [];
        snapshot.forEach(doc => transactions.push(doc.data()));
        if (transactions.length === 0) {
            transactionsDiv.innerHTML = '<div class="text-center p-3 text-muted">لا توجد معاملات</div>';
        } else {
            transactionsDiv.innerHTML = '';
            for (const t of transactions.reverse()) {
                transactionsDiv.innerHTML += `<div class="border-bottom p-2"><span class="badge bg-${t.type === 'debt' ? 'danger' : 'success'}">${t.type === 'debt' ? 'دين' : 'سداد'}</span> ${t.amount} ج.م - ${t.date}<br><small>${t.note || ''}</small></div>`;
            }
        }
        window.currentCustomerId = customer.id;
        new bootstrap.Modal(document.getElementById('detailsModal')).show();
    }
   
    document.getElementById('addDebtBtn').onclick = () => {
        document.getElementById('transactionCustomerId').value = window.currentCustomerId;
        document.getElementById('transactionType').value = 'debt';
        document.getElementById('transactionModalTitle').innerHTML = '💰 إضافة دين';
        bootstrap.Modal.getInstance(document.getElementById('detailsModal')).hide();
        new bootstrap.Modal(document.getElementById('transactionModal')).show();
    };
   
    document.getElementById('addPaymentBtn').onclick = () => {
        document.getElementById('transactionCustomerId').value = window.currentCustomerId;
        document.getElementById('transactionType').value = 'payment';
        document.getElementById('transactionModalTitle').innerHTML = '✅ إضافة سداد';
        bootstrap.Modal.getInstance(document.getElementById('detailsModal')).hide();
        new bootstrap.Modal(document.getElementById('transactionModal')).show();
    };
   
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = currentCustomers.filter(c => c.name.toLowerCase().includes(term) || (c.phone && c.phone.includes(term)));
        displayCustomers(filtered);
    });
   
    console.log("✅ التطبيق جاهز");
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('✅ Service Worker Registered');
                })
                .catch(err => {
                    console.log('❌ SW Error', err);
                });
        });
    }
    navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
    });
</script>
</body>
</html>
